<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>KRAKEN2004</title>
  <style>
    @font-face {
      font-family: 'Kraken-Primary';
      src: url('/fonts/kraken-primary.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'JetBrains Mono';
      src: url('/fonts/jetbrains-mono-latin.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
      unicode-range: U+0000-00FF;
    }
    @font-face {
      font-family: 'JetBrains Mono';
      src: url('/fonts/jetbrains-mono-latin-ext.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
      unicode-range: U+0100-024F;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      flex-direction: column;
    }
    #game-canvas {
      display: none;
    }
    #crt-canvas {
      flex: 1;
      width: 100%;
      image-rendering: pixelated;
    }
    #hud-canvas {
      width: 100%;
      flex-shrink: 0;
    }

    /* --- Menu overlay --- */
    #menu-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      color: #888;
    }
    #menu-overlay.hidden { display: none; }

    #menu-title {
      font-family: 'Kraken-Primary', monospace;
      font-size: 32px;
      color: #888;
      margin-bottom: 24px;
      letter-spacing: 4px;
    }

    #menu-box {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 240px;
    }

    #menu-box label {
      font-size: 11px;
      color: #555;
      margin-bottom: -4px;
    }

    #menu-box input[type="text"],
    #menu-box input[type="password"] {
      background: #000;
      border: 1px solid #333;
      color: #888;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: 6px 8px;
      outline: none;
    }
    #menu-box input:focus {
      border-color: #555;
    }

    .menu-btn-row {
      display: flex;
      gap: 6px;
      margin-top: 2px;
    }

    .menu-btn {
      flex: 1;
      background: #000;
      border: 1px solid #333;
      color: #888;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 8px 0;
      cursor: pointer;
    }
    .menu-btn:hover { border-color: #555; color: #aaa; }

    #menu-separator {
      text-align: center;
      color: #333;
      font-size: 11px;
      margin: 2px 0;
    }

    #btn-guest {
      background: #000;
      border: 1px solid #222;
      color: #555;
      font-size: 11px;
      padding: 6px 0;
    }
    #btn-guest:hover { color: #888; border-color: #444; }

    #menu-error {
      color: #aa3333;
      font-size: 11px;
      min-height: 14px;
      text-align: center;
      margin-top: 2px;
    }

    #menu-loading {
      color: #444;
      font-size: 11px;
      text-align: center;
      display: none;
    }

    /* --- Death overlay --- */
    #death-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(10, 0, 0, 0.85);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Kraken-Primary', monospace;
      pointer-events: none;
    }
    #death-overlay.show {
      display: flex;
      animation: deathFade 3s ease-out forwards;
    }
    #death-text {
      font-size: 56px;
      color: #aa2222;
      text-shadow: 0 0 30px rgba(170, 34, 34, 0.5);
    }
    #death-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: #664444;
      margin-top: 12px;
    }
    @keyframes deathFade {
      0% { opacity: 0; }
      15% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; display: none; }
    }

    /* --- Register prompt overlay (centered modal popup) --- */
    #register-prompt {
      position: fixed;
      inset: 0;
      z-index: 60;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      color: #888;
    }
    #register-prompt.show { display: flex; }

    #register-prompt-box {
      background: #000;
      border: 1px solid #333;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: stretch;
      width: 520px;
      max-width: 90vw;
      max-height: 85vh;
      overflow-y: auto;
    }
    #register-prompt-box h3 {
      font-size: 14px;
      font-weight: bold;
      color: #888;
      text-align: center;
      margin-bottom: 4px;
    }
    #register-prompt-box label {
      font-size: 11px;
      color: #555;
      margin-bottom: -4px;
    }
    #register-prompt-box input {
      background: #000;
      border: 1px solid #333;
      color: #888;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: 6px 8px;
      outline: none;
    }
    #register-prompt-box input:focus { border-color: #555; }
    #register-prompt-error {
      color: #aa3333;
      font-size: 11px;
      min-height: 14px;
      text-align: center;
    }

    /* --- Color picker (shared styles) --- */
    .color-swatches {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      justify-content: center;
      max-width: 520px;
      margin: 4px 0;
    }
    .color-swatch {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      cursor: pointer;
      border: 1px solid #222;
    }
    .color-swatch:hover { border-color: #555; }
    .color-swatch.selected { border-color: #aaa; }
    .gradient-section-label {
      width: 100%;
      text-align: center;
      font-size: 10px;
      color: #444;
      margin: 6px 0 2px;
    }

    /* --- Color picker overlay (main menu) --- */
    #color-picker-overlay {
      position: fixed;
      inset: 0;
      z-index: 101;
      background: #000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      color: #888;
      overflow-y: auto;
    }
    #color-picker-overlay.show { display: flex; }
    #color-picker-box {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      max-width: 520px;
      width: 100%;
      padding: 20px;
    }
    #color-picker-title {
      font-size: 13px;
      color: #888;
      margin-bottom: 4px;
    }
    .color-preview {
      font-size: 48px;
      margin: 8px 0;
      color: #888;
    }
    #color-picker-error, .color-picker-error {
      color: #aa3333;
      font-size: 11px;
      min-height: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- Menu overlay -->
  <div id="menu-overlay">
    <div id="menu-title">KRAKEN2004</div>
    <div id="menu-box">
      <label>Username</label>
      <input type="text" id="menu-username" maxlength="16" autocomplete="username" spellcheck="false">
      <label>Password</label>
      <input type="password" id="menu-password" autocomplete="current-password">
      <div class="menu-btn-row">
        <button class="menu-btn" id="btn-login">Login</button>
        <button class="menu-btn" id="btn-register">Register</button>
      </div>
      <div id="menu-separator">── or ──</div>
      <button class="menu-btn" id="btn-guest">Play as Guest</button>
      <div id="menu-error"></div>
      <div id="menu-loading">Connecting...</div>
    </div>
  </div>

  <!-- Death overlay -->
  <div id="death-overlay">
    <div id="death-text">YOU DIED</div>
    <div id="death-sub">returning to last save...</div>
  </div>

  <!-- Color picker overlay (main menu - guest or registration step 2) -->
  <div id="color-picker-overlay">
    <div id="color-picker-box">
      <div id="color-picker-title">Choose your color</div>
      <div class="color-preview" id="color-picker-preview">@</div>
      <div class="color-swatches" id="color-picker-swatches"></div>
      <button class="menu-btn" id="btn-color-confirm" style="width:240px">Confirm</button>
      <button class="menu-btn" id="btn-color-back" style="width:240px;color:#555;border-color:#222;font-size:11px">Back</button>
      <div id="color-picker-error"></div>
    </div>
  </div>

  <!-- In-game register prompt (full-screen, matches main menu) -->
  <div id="register-prompt">
    <div id="register-prompt-box">
      <h3>Save your progress</h3>
      <label>Username</label>
      <input type="text" id="reg-prompt-username" maxlength="16" spellcheck="false">
      <label>Password</label>
      <input type="password" id="reg-prompt-password">
      <div class="color-preview" id="reg-prompt-preview">@</div>
      <div class="color-swatches" id="reg-prompt-swatches"></div>
      <div class="menu-btn-row">
        <button class="menu-btn" id="btn-reg-confirm">Register</button>
        <button class="menu-btn" id="btn-reg-dismiss" style="color:#555;border-color:#222">Not now</button>
      </div>
      <div id="register-prompt-error"></div>
    </div>
  </div>

  <canvas id="game-canvas"></canvas>
  <canvas id="crt-canvas"></canvas>
  <canvas id="hud-canvas"></canvas>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
