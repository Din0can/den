services:
  app:
    build: .
    container_name: Dinos-kraken
    restart: always
    networks:
      - proxy
    labels:
      description: "kraken.d1no.dev - KRAKEN2004 Multiplayer CRT dungeon crawler"
      maintainer: "Dino"
      homepage: "https://kraken.d1no.dev"
      com.docker.compose.project: "den"
      traefik.enable: "true"
      traefik.http.routers.kraken.rule: "Host(`kraken.d1no.dev`)"
      traefik.http.routers.kraken.entrypoints: "websecure"
      traefik.http.routers.kraken.tls.certresolver: "letsencrypt"
      traefik.http.services.kraken.loadbalancer.server.port: "3000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  proxy:
    external: true
